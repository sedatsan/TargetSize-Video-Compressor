name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Cache vcpkg archives
      uses: actions/cache@v4
      with:
        path: |
          ~/AppData/Local/vcpkg/archives
          vcpkg_installed
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Configure CMake
      shell: pwsh
      run: |
        $vcpkgToolchain = "$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
        cmake --preset x64-release `
          "-DCMAKE_TOOLCHAIN_FILE=$vcpkgToolchain" `
          "-DVCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT"

    - name: Build targetsize-video-compressor
      shell: pwsh
      run: |
        cmake --build out/build/x64-release --config Release

    - name: Package Release
      shell: pwsh
      run: |
        mkdir release_package
        cp out/build/x64-release/targetsize-video-compressor.exe release_package/
        cp out/build/x64-release/vcpkg_installed/x64-windows/tools/ffmpeg/* release_package/

    - name: Functional Test
      shell: pwsh
      run: |
        cd release_package
        .\ffmpeg.exe -f lavfi -i color=c=blue:s=640x480:d=2 -vcodec libx264 dummy.mp4
        .\targetsize-video-compressor.exe dummy.mp4 5 output_compressed.mp4
        if (-Not (Test-Path output_compressed.mp4)) {
            Write-Error "Test failed: output_compressed.mp4 was not generated"
            exit 1
        }
        Write-Host "Functional test passed successfully!"

    - name: Archive Release
      shell: pwsh
      run: |
        Compress-Archive -Path release_package/* -DestinationPath targetsize-video-compressor-windows-x64.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: targetsize-video-compressor-windows-x64
        path: targetsize-video-compressor-windows-x64.zip

    - name: Publish Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: targetsize-video-compressor-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
